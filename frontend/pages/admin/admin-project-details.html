<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Admin Dashboard</title>
    <link rel="stylesheet" href="/frontend/css/admin/admin-project-details.css">
    <link rel="stylesheet" href="">
</head>
<body>
        <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <nav>
      <ul>
        <li><a href="#"><i class="fa-solid fa-house"></i> Dashboard</a></li>
        <li><a href="/frontend/pages/admin/admin-project-details.html" class="active"><i class="fa-solid fa-folder-open"></i> Projects</a></li>
        <li><a href="#"><i class="fa-solid fa-users"></i> Volunteers</a></li>
        <li><a href="#"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
        <li><a href="#"><i class="fa-solid fa-gear"></i> Settings</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <h1 class="project-details">Project Details</h1>
    <!-- Project Overview -->
    <section class="project-overview">
        <div class="project-info">
            <div class="project-title">
                <h3>Project Name</h3>
                <p id="project-name"></p>
                <!-- project namewill appear in here -->
            </div>

        <p id="project-description"></p>
        <!-- project-description will appear in hear -->
      </div>
        

      <!-- Project Meta -->
      <div class="project-meta">
        <p><strong>Due Date:</strong> <br> <span id="project-due">--</span></p>
        <p><strong>Estimated Hours:</strong> <br> <span id="project-hours">--</span></p>
        <p><strong>Status:</strong> <br> <span id="project-status">--</span></p>
      </div>
    </section>

    <!-- Task List -->
    <section class="task-list-section">
      <div class="task-list-wrapper">
        <h3>Task List</h3>
        <ul id="tasks-container">
          <!-- Tasks will be dynamically inserted here -->
        </ul>
      </div>
    </section>

    <!-- Project Actions -->
    <section class="project-actions">
      <button class="btn-create-task">Create Task</button>
      <button class="btn-edit-project">Edit Project</button>
      <button class="btn-edit-project">Edit Task</button>
      <a href="/frontend/pages/vlounteers/view-volunteers.html" class="btn-view-volunteers">View Volunteers</a>
    </section>

    <!-- Task History -->
    <section class="task-history">
      <h3>Task history</h3>
      <ul id="task-history-container">
        <!-- Completed tasks will be dynamically inserted here -->
      </ul>
    </section>

  </main>

  <script src="/frontend/javascript/admin/admin-project-details.js"></script>

</body>
</html>

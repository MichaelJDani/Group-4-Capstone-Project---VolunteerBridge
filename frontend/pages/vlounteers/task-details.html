<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard</title>
    <link rel="stylesheet" href="../../css/task-details.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../../javascript/task-details.js" ></script>
</head>
</head>

<body>
    <div class="container">
        <aside>
            <div class="menu-item">
                <a href="volunteer-dashboard.html">
                    <i class="fa-solid fa-chart-column active-link"></i>
                </a>
                <span >Dashboard</span>
            </div>

            <div class="menu-item">
                <a href="volunteer-project.html">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </a>
                <span>Projects</span>
            </div>

            <div class="menu-item active notification-icon">
                <a href="volunteer-notification.html">
                    <i class="fa-solid fa-bell"></i>
                </a>
                <span class="badge" id="badgeCount">3</span>
                <span>Notifications</span>
            </div>

            <div class="menu-item">
                <a href="volunteer-profile.html">
                    <i class="fa-solid fa-user"></i>
                </a>
                <span>Profile</span>
            </div>

        </aside>

        <main>
            <h1>Task Details</h1>
            <div class="task-details-container">
                <div>
                    <p class="task-header">Task name</p>
                    <div id="title"></div>
                </div>
                <div>
                    <p class="task-header">Project name</p>
                    <p id="description"></p>
                </div>
                <div>
                    <p class="task-header">Due date</p>
                    <p id="dueDate"></p>
                </div>
                <div>
                    <p class="task-header">Estimated hours</p>
                    <p id="estimatedHours"></p>
                </div>
                <div>
                    <p class="task-header">Status</p>
                    <p id="status"></p>
                </div>
            </div>
            <div class="back" onclick="window.location.href = 'volunteer-dashboard.html'">← Back</div>
        </main>
    </div>



</body>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volunteer Dashboard</title>
    <link rel="stylesheet" href="../../css/volunteer-dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <aside>
        <div class="menu-item">
          <a href="volunteer-dashboard.html">
            <i class="fa-solid fa-chart-column active-link"></i>
          </a>
          <span>Dashboard</span>
        </div>

        <div class="menu-item">
          <a href="volunteer-project.html">
            <i class="fa-solid fa-screwdriver-wrench"></i>
          </a>
          <span>Projects</span>
        </div>

        <div class="menu-item active notification-icon">
          <a href="volunteer-notification.html">
            <i class="fa-solid fa-bell"></i>
          </a>
          <span class="badge" id="badgeCount">3</span>
          <span>Notifications</span>
        </div>

        <div class="menu-item">
          <a href="volunteer-profile.html">
            <i class="fa-solid fa-user"></i>
          </a>
          <span>Profile</span>
        </div>
      </aside>

      <main>
        <div class="logo">Volunteer<span>Bridge</span></div>
        <div class="topbar">
          <div class="profile">
            <img src="../../assets/Avatar.png" />
            <div class="welcome-text">
              <p>Welcome Emeka</p>
            </div>
          </div>
          <div class="actions">
            <div class="search">
              <input type="text" placeholder="Search Task..." />
              <i class="fa-solid fa-gear"></i>
            </div>

            <div class="status">
              <select name="" id="selectStatus" onclick="updatecolor()">
                <option class="available">Available</option>
                <option class="busy">Busy</option>
                <option class="offline">Offline</option>
              </select>
            </div>
          </div>
        </div>
        <div>
          <h1>My Task</h1>
          <div id="taskList"></div>
        </div>
      </main>
    </div>

    <script src="../../javascript/volunteer-dashboard.js"></script>
  </body>
</html>
